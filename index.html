const DATA = RAW.zips;
const ranked = Object.entries(DATA).sort((a,b)=>b[1].n-a[1].n);
const rankOf = {}; ranked.forEach((d,i)=>rankOf[d[0]]=i+1);
const maxN = ranked[0][1].n;
const GREENS=["#e5f5e0","#c7e9c0","#a1d99b","#74c476","#41ab5d","#238b45","#005a32"];
function greenFor(n){const t=n/maxN;if(t>0.85)return GREENS[6];if(t>0.60)return GREENS[5];if(t>0.40)return GREENS[4];if(t>0.25)return GREENS[3];if(t>0.12)return GREENS[2];if(t>0.05)return GREENS[1];return GREENS[0];}
const usd=v=>'$'+Math.round(v).toLocaleString('en-US');
const usd2=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const sel=new Set();
const layersByZip={};
const map=L.map('map',{zoomControl:true}).setView([27.95,-82.55],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
function styleFor(z){const d=DATA[z];if(!d)return{weight:0,fillOpacity:0};
  if(sel.has(z))return{weight:3.5,color:'#7a5200',fillColor:greenFor(d.n),fillOpacity:0.95,dashArray:null};
  return{weight:0.8,color:'#3f6b52',fillColor:greenFor(d.n),fillOpacity:0.78};}
function tipHtml(z){const d=DATA[z];const days=d.d.length;return `<b>Zip ${z}</b><br>Trips: ${d.n} &middot; Rank #${rankOf[z]} of ${ranked.length}<br>Revenue: ${usd(d.rev)}<br>Rev/trip: ${usd2(d.rev/d.n)}<br>Rev/day: ${usd2(d.rev/days)} <span style="color:#888">(${days} days)</span>`;}
function summary(){
  const box=document.getElementById('summary');
  const zips=sel.size?[...sel]:Object.keys(DATA);
  let n=0,rev=0;const dayset=new Set();
  zips.forEach(z=>{n+=DATA[z].n;rev+=DATA[z].rev;DATA[z].d.forEach(x=>dayset.add(x));});
  const days=dayset.size||1;
  const label=sel.size? `${sel.size} zip${sel.size>1?'s':''} selected` : `All ${zips.length} zips`;
  const list=sel.size? '<div class="lab" style="margin-top:4px">'+[...sel].sort().join(', ')+'</div>' : '';
  box.innerHTML=`<div class="lab">${label}</div>`+
    `<div class="big">${n.toLocaleString()} trips &middot; ${usd(rev)}</div>`+
    `<div class="grid"><div><span class="lab">Rev/Trip</span><br><b>${usd2(rev/n)}</b></div>`+
    `<div><span class="lab">Rev/Day</span><br><b>${usd2(rev/days)}</b></div>`+
    `<div><span class="lab">Active days</span><br><b>${days}</b></div></div>`+
    list+
    (sel.size? `<button class="clr" onclick="clearSel()">Clear selection</button>`:'');
}
function toggle(z){ if(sel.has(z))sel.delete(z); else sel.add(z);
  const ly=layersByZip[z]; if(ly){ly.setStyle(styleFor(z)); if(sel.has(z))ly.bringToFront();}
  document.querySelectorAll('tr.row').forEach(tr=>tr.classList.toggle('sel',sel.has(tr.dataset.zip)));
  summary();
}
function zoomTo(z){ const ly=layersByZip[z]; if(ly&&ly.getBounds&&ly.getBounds().isValid()){ map.fitBounds(ly.getBounds().pad(0.5)); ly.bringToFront(); } }
function clearSel(){ const was=[...sel]; sel.clear(); was.forEach(z=>{if(layersByZip[z])layersByZip[z].setStyle(styleFor(z));});
  document.querySelectorAll('tr.row').forEach(tr=>tr.classList.remove('sel')); summary(); }
fetch("https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/fl_florida_zip_codes_geo.min.json")
 .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
 .then(gj=>{
   const want=new Set(Object.keys(DATA));
   const feats=gj.features.filter(f=>want.has(f.properties.ZCTA5CE10));
   const labels=L.layerGroup().addTo(map);
   L.geoJSON(feats,{style:f=>styleFor(f.properties.ZCTA5CE10),onEachFeature:(f,ly)=>{
     const z=f.properties.ZCTA5CE10; layersByZip[z]=ly;
     ly.bindTooltip(tipHtml(z),{className:'z',sticky:true});
     ly.on('click',()=>toggle(z));
     ly.on('mouseover',()=>{if(!sel.has(z))ly.setStyle({weight:2.5,color:'#000'});});
     ly.on('mouseout',()=>{if(!sel.has(z))ly.setStyle(styleFor(z));});
     const c=ly.getBounds().getCenter();
