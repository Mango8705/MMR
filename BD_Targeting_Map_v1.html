  #side{width:400px;display:flex;flex-direction:column;border-left:1px solid #e5e7eb;background:#fafafa;}
  #sidehead{padding:14px 16px 6px;}
  #sidelist{overflow:auto;padding:0 14px 16px;}
  h1{font-size:16px;margin:0 0 4px;}
  .sub{font-size:12px;color:#6b7280;margin:0 0 8px;}
  .faccat{margin:10px 0 3px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:#374151;display:flex;align-items:center;gap:7px;}
  .facrow{padding:5px 7px;border:1px solid #eee;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:12.5px;line-height:1.3;background:#fff;}
  .facrow:hover{background:#eef6ff;border-color:#bfdbfe;}
  .facrow b{display:block;color:#1f2937;font-weight:600;}
  .facrow span{color:#6b7280;font-size:11px;}
  .badge{display:inline-flex;width:16px;height:16px;border-radius:4px;flex:0 0 16px;}
  .legend{line-height:18px;font-size:12px;background:#fff;padding:8px 10px;border-radius:7px;box-shadow:0 1px 5px rgba(0,0,0,.25);}
  .factoggle b{font-size:12.5px;}
  .factoggle label{display:flex;align-items:center;gap:7px;margin-top:5px;cursor:pointer;font-size:12.5px;}
  .factoggle input{margin:0;}
  .factoggle .cnt{color:#6b7280;font-size:11px;margin-left:auto;}
  .mmrbadge{background:none;border:none;}
  .mmrbadge svg{filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.35));}
  .mmrpin{background:none;border:none;}
  .mmrpin svg{filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));}
  .zipnum{font-size:10px;font-weight:700;color:#334155;text-align:center;white-space:nowrap;text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff;pointer-events:none;opacity:.75;}
  .pinpanel{max-width:210px;}
  .pcbtn{border:1px solid #cbd5e1;background:#fff;color:#475569;font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:6px;cursor:pointer;}
  .pcbtn.on{background:#1f4e78;border-color:#1f4e78;color:#fff;}
  #pcRed.on{background:#e11d1d;border-color:#e11d1d;color:#fff;}
  #pcBlue.on{background:#1e6fe0;border-color:#1e6fe0;color:#fff;}
  #pinlabel{border:1px solid #cbd5e1;border-radius:6px;padding:3px 6px;font-size:12px;width:150px;}
  #facsearch{margin:8px 0 4px;}
  #facq{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:7px;padding:7px 9px;font-size:13px;}
  #facresults{max-height:210px;overflow:auto;margin-top:6px;}
  .facitem{padding:7px 9px;border:1px solid #eee;border-radius:7px;margin-bottom:6px;cursor:pointer;font-size:12.5px;line-height:1.35;background:#fff;}
  .facitem:hover{background:#eef6ff;border-color:#bfdbfe;}
  .facitem b{display:block;color:#1f2937;}
  .facitem span{color:#6b7280;font-size:11.5px;}
  .facnote{font-size:11.5px;color:#9ca3af;padding:5px 2px;}
  .popcol a{font-weight:700;text-decoration:none;}
  @media (max-width:760px){#wrap{flex-direction:column;height:auto;}#map{flex:none;width:100%;height:60vh;min-height:340px;}#side{width:100%;border-left:none;border-top:1px solid #e5e7eb;}#sidelist{overflow:visible;}}
</style></head><body>

function focusOn(lat,lon){var z=map.getZoom();if(z<13)map.setView([lat,lon],13);else map.panTo([lat,lon]);}

// ---------- Category badge icons (distinct symbol per type) ----------
function glyph(cat){
  if(cat==='H')return '<rect x="11" y="6.5" width="4" height="13" rx="1" fill="#fff"/><rect x="6.5" y="11" width="13" height="4" rx="1" fill="#fff"/>';
  if(cat==='P')return '<path d="M13 19.6C13 19.6 5.6 15.1 5.6 9.9 5.6 7.6 7.4 6.3 9.3 6.3 10.9 6.3 12.3 7.3 13 8.7 13.7 7.3 15.1 6.3 16.7 6.3 18.6 6.3 20.4 7.6 20.4 9.9 20.4 15.1 13 19.6 13 19.6Z" fill="#fff"/>';
  return '<path d="M6.8 19.4 L15.2 11 L18 13.8 L9.6 22.2 L6.8 22.2 Z" fill="#fff" transform="translate(0,-2.4)"/><path d="M15.8 10.4 L18.8 7.4 L20.6 9.2 L17.6 12.2 Z" fill="#fff" transform="translate(0,-2.4)"/>';
}
function facBadge(cat){var col=CAT[cat].color;return L.divIcon({className:'mmrbadge',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-13],tooltipAnchor:[0,-13],html:'<svg width="26" height="26" viewBox="0 0 26 26"><rect x="1.5" y="1.5" width="23" height="23" rx="6.5" fill="'+col+'" stroke="#fff" stroke-width="1.6"/>'+glyph(cat)+'</svg>'});}
function badgeMini(cat){var col=CAT[cat].color;return '<svg class="badge" viewBox="0 0 26 26" width="16" height="16"><rect x="1.5" y="1.5" width="23" height="23" rx="6.5" fill="'+col+'" stroke="#fff" stroke-width="1.6"/>'+glyph(cat)+'</svg>';}

// ---------- Manual prospect pins (with color change) ----------
var addMode=false,pinColor='red',pins=[];
function pinIcon(color){var fill=color==='blue'?'#1e6fe0':(color==='orange'?'#f59e0b':(color==='purple'?'#7c3aed':'#e11d1d'));return L.divIcon({className:'mmrpin',iconSize:[26,38],iconAnchor:[13,37],popupAnchor:[0,-34],tooltipAnchor:[0,-30],html:'<svg width="26" height="38" viewBox="0 0 26 38"><path d="M13 0C6 0 0.5 5.5 0.5 12.5 0.5 22 13 38 13 38S25.5 22 25.5 12.5C25.5 5.5 20 0 13 0z" fill="'+fill+'" stroke="#fff" stroke-width="1.5"/><circle cx="13" cy="12.5" r="4.8" fill="#fff"/></svg>'});}
function pinPopupHtml(label){return '<b>'+escHtml(label)+'</b><br><span style="font-size:11px;color:#6b7280">Color:</span> <span class="popcol"><a href="#" class="pincol" data-c="red" style="color:#e11d1d">Red</a> &middot; <a href="#" class="pincol" data-c="blue" style="color:#1e6fe0">Blue</a> &middot; <a href="#" class="pincol" data-c="orange" style="color:#f59e0b">Orange</a></span><br><a href="#" class="rmpin" style="color:#6b7280">Remove</a>';}
function addPin(lat,lng,color,label,facKey){var m=L.marker([lat,lng],{icon:pinIcon(color),draggable:true});m.bindTooltip(escHtml(label),{direction:'top'});var rec={lat:lat,lng:lng,color:color,label:label,facKey:(facKey==null?null:facKey),marker:m};
  m.on('click',function(){if(measureMode){pickEndpoint(rec.lat,rec.lng,rec.label);return;}openPinPopup(rec);});
  m.on('dragend',function(){var ll=m.getLatLng();rec.lat=ll.lat;rec.lng=ll.lng;savePins();});m.addTo(map);pins.push(rec);return rec;}
function dropPin(ll){var el=document.getElementById('pinlabel');var label=(el&&el.value.trim())||'Prospect';addPin(ll.lat,ll.lng,pinColor,label);savePins();}
function savePins(){try{localStorage.setItem('mmr_bd_pins',JSON.stringify(pins.map(function(p){return {lat:p.lat,lng:p.lng,color:p.color,label:p.label,facKey:p.facKey};})));}catch(e){}}
function loadPins(){try{JSON.parse(localStorage.getItem('mmr_bd_pins')||'[]').forEach(function(p){addPin(p.lat,p.lng,p.color,p.label,(p.facKey==null?null:p.facKey));});}catch(e){}}
function setAddMode(on){addMode=on;var b=document.getElementById('addpinbtn');if(b){b.classList.toggle('on',on);b.textContent=on?'Click map...':'Add pin';}map.getContainer().style.cursor=on?'crosshair':'';var hh=document.getElementById('pinhint');if(hh)hh.textContent=on?'Click the map to drop pins; click Add pin again to stop.':'';}
function setPinColor(c){pinColor=c;var r=document.getElementById('pcRed'),bl=document.getElementById('pcBlue');if(r)r.classList.toggle('on',c==='red');if(bl)bl.classList.toggle('on',c==='blue');}
var pinCtl=L.control({position:'topright'});
pinCtl.onAdd=function(){var d=L.DomUtil.create('div','legend pinpanel');d.innerHTML='<b>Add prospect pins</b><div style="margin:4px 0 3px">Color: <button type="button" id="pcRed" class="pcbtn on">Red</button> <button type="button" id="pcBlue" class="pcbtn">Blue</button></div><input id="pinlabel" placeholder="Pin label" maxlength="60"/><div style="margin-top:5px"><button type="button" id="addpinbtn" class="pcbtn">Add pin</button> <button type="button" id="clearpins" class="pcbtn">Clear</button></div><div id="pinhint" style="font-size:11px;color:#6b7280;margin-top:3px"></div>';L.DomEvent.disableClickPropagation(d);L.DomEvent.disableScrollPropagation(d);return d;};
pinCtl.addTo(map);
document.getElementById('pcRed').onclick=function(){setPinColor('red');};
document.getElementById('pcBlue').onclick=function(){setPinColor('blue');};
document.getElementById('addpinbtn').onclick=function(){setAddMode(!addMode);};
document.getElementById('clearpins').onclick=function(){if(pins.length&&confirm('Remove all prospect pins?')){pins.forEach(function(p){map.removeLayer(p.marker);});pins=[];savePins();}};
map.on('click',function(e){if(addMode){dropPin(e.latlng);return;}if(measureMode){var pk=nearestPin(e.latlng);if(pk)pickEndpoint(pk.lat,pk.lon,pk.label);return;}var t=nearestTarget(e.latlng);if(t){if(t.kind==='pin')openPinPopup(t.rec);else if(t.kind==='seed')openSeedPopup(t.sp);else openFacPopup(t.f,t.i);}});
loadPins();

// ---------- Facility category layers ----------
var facLayers={H:L.layerGroup(),P:L.layerGroup(),S:L.layerGroup()};
var facMarkers=[];
function hideFacility(i){if(facMarkers[i]){var lyr=facLayers[FAC[i][0]];if(lyr.hasLayer(facMarkers[i]))lyr.removeLayer(facMarkers[i]);}}
function showFacility(i){if(facMarkers[i]){facLayers[FAC[i][0]].addLayer(facMarkers[i]);}}
function facPopup(f){return '<b>'+escHtml(f[1])+'</b><br><span style="color:#6b7280;font-size:11.5px">'+CAT[f[0]].label.replace(/s$/,'')+' &middot; '+escHtml(f[5])+' '+escHtml(f[4])+'</span><br><a href="#" class="fac2pin" style="color:#b45309;font-weight:600">\u{1F4CC} Add as prospect pin</a>';}
FAC.forEach(function(f,i){var m=L.marker([f[2],f[3]],{icon:facBadge(f[0])});m.bindTooltip(escHtml(f[1]),{direction:'top'});
  m.on('click',function(){if(measureMode){pickEndpoint(f[2],f[3],f[1]);return;}openFacPopup(f,i);});
  m.addTo(facLayers[f[0]]);facMarkers[i]=m;});
facLayers.H.addTo(map);facLayers.P.addTo(map);facLayers.S.addTo(map);
pins.forEach(function(p){if(p.facKey!=null)hideFacility(p.facKey);});

function seedMini(){return '<svg viewBox="0 0 26 38" width="12" height="17" style="flex:0 0 12px"><path d="M13 0C6 0 0.5 5.5 0.5 12.5 0.5 22 13 38 13 38S25.5 22 25.5 12.5C25.5 5.5 20 0 13 0z" fill="#7c3aed" stroke="#fff" stroke-width="1.5"/><circle cx="13" cy="12.5" r="4.8" fill="#fff"/></svg>';}
function openSeedPopup(sp){L.popup({offset:[0,-34]}).setLatLng([sp.lat,sp.lon]).setContent('<b>'+escHtml(sp.label)+'</b><br><span style="color:#6b7280;font-size:11.5px">AdventHealth wound care &middot; '+escHtml(sp.addr)+'</span>').openOn(map);}

// ---------- Category toggle + legend control ----------
var togCtl=L.control({position:'topleft'});
togCtl.onAdd=function(){var d=L.DomUtil.create('div','legend factoggle');var counts={H:0,P:0,S:0};FAC.forEach(function(f){counts[f[0]]++;});
  var html='<b>Facilities</b>';['H','P','S'].forEach(function(c){html+='<label><input type="checkbox" data-c="'+c+'" checked>'+badgeMini(c)+'<span>'+CAT[c].label+'</span><span class="cnt">'+counts[c]+'</span></label>';});
  d.innerHTML=html;L.DomEvent.disableClickPropagation(d);L.DomEvent.disableScrollPropagation(d);
  Array.prototype.forEach.call(d.querySelectorAll('input'),function(inp){inp.onchange=function(){if(inp.getAttribute('data-seed')){if(inp.checked)seedLayer.addTo(map);else map.removeLayer(seedLayer);return;}var c=inp.getAttribute('data-c');if(inp.checked)facLayers[c].addTo(map);else map.removeLayer(facLayers[c]);};});
  return d;};
togCtl.addTo(map);

// ---------- Drive-time measure tool (Google Routes API) ----------
var measA=null,measB=null,measLayer=L.layerGroup().addTo(map);
function setMeasStatus(t){var e=document.getElementById('measStatus');if(e)e.innerHTML=t;}
function clearMeasure(){measA=null;measB=null;measLayer.clearLayers();setMeasStatus(measureMode?'Click the first pin (facility or prospect).':'Measure driving time between two pins.');}
function toggleMeasure(){measureMode=!measureMode;var b=document.getElementById('measToggle');if(b){b.textContent=measureMode?'Stop':'Start';b.classList.toggle('on',measureMode);}map.getContainer().style.cursor=measureMode?'crosshair':'';clearMeasure();}
var __lastPick=0;
function nearestPin(ll){var cp=map.latLngToContainerPoint(ll);var best=null,bd=1e9;FAC.forEach(function(f,i){if(facMarkers[i]&&facLayers[f[0]].hasLayer(facMarkers[i])){var d=cp.distanceTo(map.latLngToContainerPoint([f[2],f[3]]));if(d<bd){bd=d;best={lat:f[2],lon:f[3],label:f[1]};}}});pins.forEach(function(p){var d=cp.distanceTo(map.latLngToContainerPoint([p.lat,p.lng]));if(d<bd){bd=d;best={lat:p.lat,lon:p.lng,label:p.label};}});if(map.hasLayer(seedLayer))SEEDPINS.forEach(function(sp){var d=cp.distanceTo(map.latLngToContainerPoint([sp.lat,sp.lon]));if(d<bd){bd=d;best={lat:sp.lat,lon:sp.lon,label:sp.label};}});return bd<=32?best:null;}
function nearestTarget(ll){var cp=map.latLngToContainerPoint(ll);var best=null,bd=1e9;pins.forEach(function(p){var d=cp.distanceTo(map.latLngToContainerPoint([p.lat,p.lng]));if(d<bd){bd=d;best={kind:'pin',rec:p};}});FAC.forEach(function(ff,ii){if(facMarkers[ii]&&facLayers[ff[0]].hasLayer(facMarkers[ii])){var d=cp.distanceTo(map.latLngToContainerPoint([ff[2],ff[3]]));if(d<bd){bd=d;best={kind:'fac',f:ff,i:ii};}}});if(map.hasLayer(seedLayer))SEEDPINS.forEach(function(sp){var d=cp.distanceTo(map.latLngToContainerPoint([sp.lat,sp.lon]));if(d<bd){bd=d;best={kind:'seed',sp:sp};}});return bd<=32?best:null;}
function openPinPopup(rec){var m=rec.marker;var pp=L.popup({offset:[0,-34]}).setLatLng(m.getLatLng()).setContent(pinPopupHtml(rec.label)).openOn(map);var el=pp.getElement();if(!el)return;var a=el.querySelector('.rmpin');if(a)a.onclick=function(x){x.preventDefault();map.removeLayer(m);pins=pins.filter(function(q){return q!==rec;});if(rec.facKey!=null)showFacility(rec.facKey);savePins();map.closePopup();};Array.prototype.forEach.call(el.querySelectorAll('.pincol'),function(cl){cl.onclick=function(x){x.preventDefault();var c=cl.getAttribute('data-c');rec.color=c;m.setIcon(pinIcon(c));savePins();};});}
function openFacPopup(ff,ii){var p=L.popup({offset:[0,-13]}).setLatLng([ff[2],ff[3]]).setContent(facPopup(ff)).openOn(map);var el=p.getElement();if(!el)return;var a=el.querySelector('.fac2pin');if(a)a.onclick=function(x){x.preventDefault();addPin(ff[2],ff[3],'red',ff[1],ii);hideFacility(ii);savePins();map.closePopup();};}
function pickEndpoint(lat,lon,label){if(!measureMode)return;var now=Date.now();if(now-__lastPick<150)return;__lastPick=now;if(measA&&measB){clearMeasure();}if(!measA){measA={lat:lat,lon:lon,label:label};L.circleMarker([lat,lon],{radius:7,color:'#059669',weight:3,fillColor:'#fff',fillOpacity:1}).addTo(measLayer);setMeasStatus('From <b>'+escHtml(label)+'</b>.<br>Now click the destination pin.');}else{measB={lat:lat,lon:lon,label:label};L.circleMarker([lat,lon],{radius:7,color:'#dc2626',weight:3,fillColor:'#fff',fillOpacity:1}).addTo(measLayer);computeDrive();}}
function decodePolyline(str){var index=0,lat=0,lng=0,coords=[];while(index<str.length){var b,shift=0,result=0;do{b=str.charCodeAt(index++)-63;result|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);var dlat=((result&1)?~(result>>1):(result>>1));lat+=dlat;shift=0;result=0;do{b=str.charCodeAt(index++)-63;result|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);var dlng=((result&1)?~(result>>1):(result>>1));lng+=dlng;coords.push([lat/1e5,lng/1e5]);}return coords;}
function computeDrive(){setMeasStatus('Calculating drive time…');var body={origin:{location:{latLng:{latitude:measA.lat,longitude:measA.lon}}},destination:{location:{latLng:{latitude:measB.lat,longitude:measB.lon}}},travelMode:'DRIVE',routingPreference:'TRAFFIC_AWARE'};fetch('https://routes.googleapis.com/directions/v2:computeRoutes',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':GKEY,'X-Goog-FieldMask':'routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline'},body:JSON.stringify(body)}).then(function(r){return r.json();}).then(function(j){if(j.error||!j.routes||!j.routes[0]){setMeasStatus('Could not compute route'+(j.error?': '+escHtml(j.error.message):'')+'.');return;}var rt=j.routes[0];var mins=Math.round(parseInt(rt.duration)/60);var miles=(rt.distanceMeters/1609.34).toFixed(1);if(rt.polyline&&rt.polyline.encodedPolyline){L.polyline(decodePolyline(rt.polyline.encodedPolyline),{color:'#4f46e5',weight:4,opacity:0.75}).addTo(measLayer);}setMeasStatus('<b style="font-size:14px">'+mins+' min</b> &middot; '+miles+' mi<br><span style="color:#6b7280">'+escHtml(measA.label)+' &rarr; '+escHtml(measB.label)+'</span><br><span style="color:#9ca3af;font-size:10.5px">driving, live traffic</span>');}).catch(function(e){setMeasStatus('Route error: '+escHtml(e.message));});}
var measCtl=L.control({position:'topleft'});
measCtl.onAdd=function(){var d=L.DomUtil.create('div','legend');d.style.marginTop='8px';d.innerHTML='<b>Drive-time tool</b><div id="measStatus" style="font-size:11.5px;color:#6b7280;margin:3px 0;max-width:190px">Measure driving time between two pins.</div><button type="button" id="measToggle" class="pcbtn">Start</button> <button type="button" id="measClear" class="pcbtn">Clear</button>';L.DomEvent.disableClickPropagation(d);L.DomEvent.disableScrollPropagation(d);return d;};
measCtl.addTo(map);
document.getElementById('measToggle').onclick=toggleMeasure;
document.getElementById('measClear').onclick=clearMeasure;

// ---------- Side-panel facility list ----------
function flyToFac(i){var f=FAC[i];focusOn(f[2],f[3]);var m=facMarkers[i];if(m&&facLayers[f[0]].hasLayer(m)){openFacPopup(f,i);}}
(function(){var el=document.getElementById('sidelist');var html='';['H','P','S'].forEach(function(c){var rows=FAC.map(function(f,i){return [f,i];}).filter(function(x){return x[0][0]===c;});
  html+='<div class="faccat">'+badgeMini(c)+' '+CAT[c].label+' ('+rows.length+')</div>';
  rows.forEach(function(x){html+='<div class="facrow" data-i="'+x[1]+'"><b>'+escHtml(x[0][1])+'</b><span>'+escHtml(x[0][5])+' &middot; '+escHtml(x[0][4])+'</span></div>';});});
  el.innerHTML=html;Array.prototype.forEach.call(el.querySelectorAll('.facrow'),function(r){r.onclick=function(){flyToFac(+r.dataset.i);};});})();

// ---------- Zip boundaries (thin gray, reference only) ----------
var layersByZip={};var zipLabels=L.layerGroup().addTo(map);var activeZip=null;var serviceBounds=null;
function zipStyle(){return {weight:1,color:'#94a3b8',opacity:0.75,fill:false};}
function selectZip(z){var lyr=layersByZip[z];if(!lyr)return;if(activeZip&&layersByZip[activeZip])layersByZip[activeZip].setStyle(zipStyle());activeZip=z;lyr.setStyle({weight:3,color:'#1f4e78',opacity:1,fill:false});lyr.bringToFront();facScope();}
fetch("https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/fl_florida_zip_codes_geo.min.json")
 .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
 .then(function(gj){var want=new Set(ZIPS);var feats=gj.features.filter(function(f){return want.has(f.properties.ZCTA5CE10);});
   L.geoJSON(feats,{style:zipStyle,onEachFeature:function(f,lyr){var z=f.properties.ZCTA5CE10;layersByZip[z]=lyr;
     lyr.on('click',function(e){if(addMode){dropPin(e.latlng);L.DomEvent.stop(e);}else selectZip(z);});
     lyr.on('mouseover',function(){if(z!==activeZip)lyr.setStyle({weight:2,color:'#475569'});});
     lyr.on('mouseout',function(){if(z!==activeZip)lyr.setStyle(zipStyle());});
     L.marker(lyr.getBounds().getCenter(),{interactive:false,keyboard:false,icon:L.divIcon({className:'',html:'<div class="zipnum">'+z+'</div>',iconSize:[42,12],iconAnchor:[21,6]})}).addTo(zipLabels);}}).addTo(map);
   var all=L.featureGroup(Object.values(layersByZip));if(all.getBounds().isValid())serviceBounds=all.getBounds();
   function togZip(){var show=map.getZoom()>=12;zipLabels.eachLayer(function(l){var e=l.getElement&&l.getElement();if(e)e.style.display=show?'':'none';});}
   map.on('zoomend',togZip);togZip();facScope();})
 .catch(function(e){});

// ---------- Facility / address search (Google Places, service-area scoped) ----------
var facMarker=null;
function facIcon(){return L.divIcon({className:'mmrpin',iconSize:[28,40],iconAnchor:[14,39],popupAnchor:[0,-36],html:'<svg width="28" height="40" viewBox="0 0 28 40"><path d="M14 0C6.3 0 0 6.3 0 14 0 24 14 40 14 40S28 24 28 14C28 6.3 21.7 0 14 0z" fill="#f59e0b" stroke="#fff" stroke-width="1.6"/><circle cx="14" cy="14" r="5" fill="#fff"/></svg>'});}
function facShow(list){var el=document.getElementById('facresults');if(!el)return;if(list===null){el.innerHTML='';return;}if(!list.length){el.innerHTML='<div class="facnote">No matches. Try adding a city or ZIP.</div>';return;}el.innerHTML=list.map(function(r,i){var nm=r.name||(r.display_name||'').split(',')[0];var addr=(r.display_name||'').split(',').slice(1).join(',').trim();return '<div class="facitem" data-i="'+i+'"><b>'+escHtml(nm)+'</b><span>'+escHtml(addr)+'</span></div>';}).join('');Array.prototype.forEach.call(el.querySelectorAll('.facitem'),function(it){it.onclick=function(){facSelect(list[+it.dataset.i]);};});}
var facCurrent=null;
function facSelect(r){var lat=parseFloat(r.lat),lon=parseFloat(r.lon);if(isNaN(lat)||isNaN(lon))return;if(facMarker)map.removeLayer(facMarker);var nm=r.name||(r.display_name||'').split(',')[0];facCurrent={lat:lat,lon:lon,name:nm};facMarker=L.marker([lat,lon],{icon:facIcon()}).addTo(map);facMarker.bindPopup('<b>'+escHtml(nm)+'</b><br>'+escHtml(r.display_name||'')+'<br><a href="#" class="fackeep" style="color:#b45309;font-weight:600">\u{1F4CC} Keep as pin</a>');facMarker.on('popupopen',function(ev){var a=ev.popup.getElement().querySelector('.fackeep');if(a)a.onclick=function(x){x.preventDefault();facKeep();};});facMarker.openPopup();focusOn(lat,lon);}
function facKeep(){if(!facCurrent)return;addPin(facCurrent.lat,facCurrent.lon,'red',facCurrent.name);savePins();if(facMarker){map.removeLayer(facMarker);facMarker=null;}}
function facScope(){var el=document.getElementById('facscope');if(!el)return;if(activeZip){el.innerHTML='Search area: ZIP '+activeZip+' <a href="#" id="facclr" style="color:#2563eb">(clear)</a>';var a=document.getElementById('facclr');if(a)a.onclick=function(x){x.preventDefault();facClearZip();};}else{el.innerHTML='Search area: service area (Pasco &amp; Pinellas)';}}
function facClearZip(){if(activeZip&&layersByZip[activeZip])layersByZip[activeZip].setStyle(zipStyle());activeZip=null;facScope();}
var GKEY='AIzaSyBCfjbyc24luBZ7e8xHpoJaPsaaE8ACzHk';
function gmapComp(comps,type){if(!comps)return'';for(var i=0;i<comps.length;i++){if((comps[i].types||[]).indexOf(type)>=0)return comps[i].longText||comps[i].shortText||'';}return'';}
function facRun(){var q=(document.getElementById('facq').value||'').trim();var el=document.getElementById('facresults');if(!q){facShow(null);return;}el.innerHTML='<div class="facnote">Searching...</div>';var useZip=activeZip&&layersByZip[activeZip];var bnds=useZip?layersByZip[activeZip].getBounds():(serviceBounds||map.getBounds());var body={textQuery:q,regionCode:'US',maxResultCount:15,locationRestriction:{rectangle:{low:{latitude:bnds.getSouth(),longitude:bnds.getWest()},high:{latitude:bnds.getNorth(),longitude:bnds.getEast()}}}};fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':GKEY,'X-Goog-FieldMask':'places.displayName,places.formattedAddress,places.location,places.addressComponents'},body:JSON.stringify(body)}).then(function(r){return r.json();}).then(function(j){if(j&&j.error){el.innerHTML='<div class="facnote">Search error: '+escHtml(j.error.message||'unknown')+'</div>';return;}var list=((j&&j.places)||[]).map(function(p){var loc=p.location||{};var nm=(p.displayName&&p.displayName.text)||'';return {lat:loc.latitude,lon:loc.longitude,name:nm,display_name:(nm?nm+', ':'')+(p.formattedAddress||''),address:{postcode:gmapComp(p.addressComponents,'postal_code'),county:gmapComp(p.addressComponents,'administrative_area_level_2')}};});var filt=list.filter(function(r){var lat=parseFloat(r.lat),lon=parseFloat(r.lon);if(isNaN(lat)||isNaN(lon)||!bnds.contains([lat,lon]))return false;var a=r.address||{};if(useZip){return !a.postcode||a.postcode===activeZip;}var cty=(a.county||'').toLowerCase();if(cty.indexOf('pinellas')>=0||cty.indexOf('pasco')>=0)return true;if(a.postcode&&ZIPS.indexOf(a.postcode)>=0)return true;return !a.postcode&&!a.county;}).slice(0,8);if(!filt.length){el.innerHTML='<div class="facnote">No matches in '+(useZip?'ZIP '+activeZip:'the service area')+'. Try a nearby address'+(useZip?' or clear the ZIP filter':'')+'.</div>';return;}facShow(filt);}).catch(function(e){el.innerHTML='<div class="facnote">Search failed ('+escHtml(e.message)+'). Try again.</div>';});}
(function(){var btn=document.getElementById('facbtn'),q=document.getElementById('facq');if(btn)btn.onclick=facRun;if(q)q.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();facRun();}});})();facScope();

function fixSize(){setTimeout(function(){map.invalidateSize();},200);}
window.addEventListener('resize',fixSize);window.addEventListener('orientationchange',fixSize);setTimeout(fixSize,400);
</script></body></html>
