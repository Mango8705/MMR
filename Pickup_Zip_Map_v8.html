const MODES={n:'Trips',amb:'Ambulatory',wc:'Wheelchair',bwc:'Bariatric WC',profit:'Profit'};
let metric='n';
const val=z=>metric==='profit'?DATA[z].profit:(DATA[z][metric]||0);
let curMax=Math.max(1,...Object.keys(DATA).map(val)), curMaxAbs=1;
const GREENS=["#e5f5e0","#c7e9c0","#a1d99b","#74c476","#41ab5d","#238b45","#005a32"];
const REDS=["#fee0d2","#fcbba1","#fc9272","#fb6a4a","#ef3b2c","#cb181d","#99000d"];
function bucket(t){if(t>0.85)return 6;if(t>0.60)return 5;if(t>0.40)return 4;if(t>0.25)return 3;if(t>0.12)return 2;if(t>0.05)return 1;return 0;}
function shade(z){ if(metric==='profit'){const p=DATA[z].profit;const t=Math.abs(p)/curMaxAbs;return (p>=0?GREENS:REDS)[bucket(t)];}
  const v=val(z); if(v<=0)return null; return GREENS[bucket(v/curMax)]; }
const usd=v=>'$'+Math.round(v).toLocaleString('en-US');
const usd2=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const sgn=v=>v>=0?usd(v):'-'+usd(-v);
const map=L.map('map',{zoomControl:true}).setView([27.95,-82.55],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
const layersByZip={}; const labelLayer=L.layerGroup().addTo(map); let activeZip=null;
function styleFor(z){const c=shade(z); return c?{weight:0.8,color:"#3f6b52",fillColor:c,fillOpacity:0.80}:{weight:0.6,color:"#d0d0d0",fillColor:"#ededed",fillOpacity:0.35};}
function tipHtml(z){const d=DATA[z];const pc=d.profit>=0?'#0b6b33':'#b91c1c';const head=metric==='profit'
   ?`<b style="color:${pc}">Profit: ${sgn(d.profit)}</b>`:`<b>${MODES[metric]}: ${val(z)}</b>${metric!=='n'?` of ${d.n} trips`:''}`;
  return `<b>Zip ${z}</b><br>${head}<br>`+
   `Ambulatory ${d.amb} &middot; Wheelchair ${d.wc} &middot; Bariatric WC ${d.bwc} &middot; Stretcher ${d.str}<br>`+
   `Trips: ${d.n} &middot; Revenue: ${usd(d.rev)} &middot; Cost: ${usd(d.cost)}<br>`+
   `Profit: <span style="color:${pc}">${sgn(d.profit)}</span> &middot; Rev/trip: ${usd2(d.rev/d.n)}`;}
function selectZip(zip){const lyr=layersByZip[zip];
  document.querySelectorAll('tr.row').forEach(tr=>tr.classList.toggle('active',tr.dataset.zip===zip));
  if(!lyr)return; if(activeZip&&layersByZip[activeZip])layersByZip[activeZip].setStyle(styleFor(activeZip));
  activeZip=zip; const c=shade(zip)||'#bdbdbd';
  lyr.setStyle({weight:4,color:'#000',fillColor:c,fillOpacity:0.92});lyr.bringToFront();
  map.fitBounds(lyr.getBounds().pad(0.5));
  L.popup({offset:[0,-2]}).setLatLng(lyr.getBounds().getCenter()).setContent(tipHtml(zip)).openOn(map);}
function buildTable(){const th=document.querySelector('#tbl thead');const tb=document.querySelector('#tbl tbody');tb.innerHTML='';
  if(metric==='profit'){const ranked=Object.entries(DATA).sort((a,b)=>b[1].profit-a[1].profit);
    th.innerHTML='<tr><th>#</th><th>Zip</th><th class="n">Trips</th><th class="n">Revenue</th><th class="n">Cost</th><th class="n">Profit</th><th class="n">Rev/Trip</th></tr>';
    ranked.forEach(([z,v],i)=>{const tr=document.createElement('tr');tr.className='row';tr.dataset.zip=z;
      tr.innerHTML=`<td>${i+1}</td><td><span class="swatch" style="background:${shade(z)}"></span><span class="ziplink">${z}</span></td><td class="n">${v.n}</td><td class="n">${usd(v.rev)}</td><td class="n">${usd(v.cost)}</td><td class="n ${v.profit>=0?'pos':'neg'}">${sgn(v.profit)}</td><td class="n">${usd2(v.rev/v.n)}</td>`;
      tr.addEventListener('click',()=>selectZip(z));tb.appendChild(tr);});return;}
  const lab=MODES[metric];const ranked=Object.entries(DATA).filter(([z])=>metric==='n'||val(z)>0).sort((a,b)=>val(b[0])-val(a[0]));
  th.innerHTML = metric==='n'?'<tr><th>#</th><th>Zip</th><th class="n">Trips</th><th class="n">Revenue</th><th class="n">Rev/Trip</th></tr>'

      :`<td>${i+1}</td><td>${sw}<span class="ziplink">${z}</span></td><td class="n">${val(z)}</td><td class="n">${v.n}</td><td class="n">${usd(v.rev)}</td>`;

function updateLegend(){ legendDiv.innerHTML = metric==='profit'

function setMetric(m){metric=m;
  if(m==='profit')curMaxAbs=Math.max(1,...Object.keys(DATA).map(z=>Math.abs(DATA[z].profit)));else curMax=Math.max(1,...Object.keys(DATA).map(val));

  if(activeZip&&layersByZip[activeZip]){const c=shade(activeZip)||'#bdbdbd';layersByZip[activeZip].setStyle({weight:4,color:'#000',fillColor:c,fillOpacity:0.92});}
  updateLegend();buildTable();
  document.getElementById('hint').textContent = m==='profit'
    ?'Green = profitable zips, red = loss (revenue minus allocated direct cost). Click a row or zip for the full breakdown.'

fetch("https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/fl_florida_zip_codes_geo.min.json")

 .then(gj=>{const want=new Set(Object.keys(DATA));const feats=gj.features.filter(f=>want.has(f.properties.ZCTA5CE10));
    L.geoJSON(feats,{style:f=>styleFor(f.properties.ZCTA5CE10),onEachFeature:(f,lyr)=>{const z=f.properties.ZCTA5CE10;layersByZip[z]=lyr;
      lyr.bindTooltip(()=>tipHtml(z),{className:'z',sticky:true});
      lyr.on('click',()=>selectZip(z));
      lyr.on('mouseover',()=>{if(z!==activeZip)lyr.setStyle({weight:2.5,color:'#000'});});
      lyr.on('mouseout',()=>{if(z!==activeZip)lyr.setStyle(styleFor(z));});
      const c=lyr.getBounds().getCenter();
      L.marker(c,{interactive:false,keyboard:false,icon:L.divIcon({className:'',html:`<div class="zipcode">${z}</div>`,iconSize:[46,14],iconAnchor:[23,7]})}).addTo(labelLayer);}}).addTo(map);
    const all=L.featureGroup(Object.values(layersByZip));if(all.getBounds().isValid())map.fitBounds(all.getBounds().pad(0.05));
    function toggleLabels(){const show=map.getZoom()>=10;labelLayer.eachLayer(l=>{const e=l.getElement&&l.getElement();if(e)e.style.display=show?'':'none';});}
    map.on('zoomend',toggleLabels);toggleLabels();
    document.getElementById('status').textContent=`${feats.length} of ${Object.keys(DATA).length} served zips drawn.`;})
