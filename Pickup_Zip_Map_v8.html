const MODES={n:'Trips',amb:'Ambulatory',wc:'Wheelchair',bwc:'Bariatric WC'};
let metric='n';
const val=z=>DATA[z][metric]||0;
let curMax=Math.max(1,...Object.keys(DATA).map(val));
const GREENS=["#e5f5e0","#c7e9c0","#a1d99b","#74c476","#41ab5d","#238b45","#005a32"];
function greenFor(v){ if(v<=0) return null; const t=v/curMax;
  if(t>0.85)return GREENS[6]; if(t>0.60)return GREENS[5]; if(t>0.40)return GREENS[4];
  if(t>0.25)return GREENS[3]; if(t>0.12)return GREENS[2]; if(t>0.05)return GREENS[1]; return GREENS[0]; }

function buildTable(){const lab=MODES[metric];

function updateLegend(){legendDiv.innerHTML=`<b>${MODES[metric]} volume</b><br>`+
